# NACA 4412 — 2x2 study cell (low Re, low alpha). One of four scenes that
# vary ONLY velocity_ms (the Reynolds knob) and alpha_deg, so reading the
# set across shows the angle-of-attack effect and down shows the Reynolds
# effect — single-variable comparisons, per the rules. Runs on the Phase 8
# ACCURATE path: collision: trt (wall pinned across viscosity) and
# obstacle.curved_bc: true (the airfoil is a true curve, not a staircase).
# sgs: true throughout — the tau floor requires it here, and Phase 5 proved
# it inert on resolved flow.
name: naca4412_a3_re3k
description: >
  NACA 4412, chord 256 cells, Re = 3,000 (U = 0.45 m/s), alpha 3 deg.
  Low Re + low alpha: attached, thick laminar boundary layer, steady wake.

physical:
  char_length_m: 0.1        # chord c [m]
  velocity_ms: 0.45         # freestream U [m/s]  ->  Re = 3,000
  nu_m2s: 1.5e-5

lattice:
  cells_per_char: 256       # chord = 256 cells
  u_lat: 0.05               # low: high-alpha suction peaks amplify local u

domain:
  length_chars: 8
  height_chars: 5

sgs: true
collision: trt              # Phase 8: two-relaxation-time (pins the wall)

boundaries:
  inlet: equilibrium_ramp
  outlet: pressure_sponge
  top_bottom: periodic
  ramp_steps: 2000
  sponge_fraction: 0.08

obstacle:
  type: airfoil_dat
  dat_file: assets/naca4412.dat
  alpha_deg: 3.0
  center_x_chars: 2.0
  center_y_chars: 2.5
  edge_supersample: 4
  curved_bc: true           # Phase 8: Bouzidi interpolated walls

render:
  preset: vorticity
  zoom: [1.0, 1.0, 6.0, 4.0]
