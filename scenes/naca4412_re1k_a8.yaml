# NACA 4412 footage scene (re1k_a8): part of the Reynolds-transition /
# downwash-pair shot family. Identical geometry and framing to
# naca4412_re20k; ONLY velocity_ms (the Reynolds knob) and alpha_deg
# vary across the family — single-variable comparisons, per the rules.
# sgs: true everywhere for family consistency (Phase 5 validated the
# model inert on resolved flow; at Re >= 5k the tau floor requires it).
name: naca4412_re1k_a8
description: >
  NACA 4412 footage shot, chord 400 cells. velocity_ms 0.15
  (Re = U*L/nu), alpha 8.0 deg.

physical:
  char_length_m: 0.1
  velocity_ms: 0.15
  nu_m2s: 1.5e-5

lattice:
  cells_per_char: 400
  u_lat: 0.05

domain:
  length_chars: 8
  height_chars: 5

sgs: true

boundaries:
  inlet: equilibrium_ramp
  outlet: pressure_sponge
  top_bottom: periodic
  ramp_steps: 2000
  sponge_fraction: 0.08

obstacle:
  type: airfoil_dat
  dat_file: assets/naca4412.dat
  alpha_deg: 8.0
  center_x_chars: 2.0
  center_y_chars: 2.5
  edge_supersample: 4
