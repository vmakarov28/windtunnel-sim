# Circular cylinder at Re = 100 — the vortex-street workhorse.
# Validation targets (Phase 2): St in [0.155, 0.175], mean Cd in [1.25, 1.45].
# 3D note: at Re = 100 the cylinder wake is physically two-dimensional
# (mode-A spanwise instability onsets near Re ~ 190), so a short periodic
# span of 3D is enough and the 2D St/Cd bands remain the valid reference.
name: cylinder_re100
description: >
  Karman vortex street behind a circular cylinder at Re = 100,
  spanwise-periodic. Characteristic length = cylinder diameter.

physical:
  char_length_m: 0.05      # cylinder diameter D [m]
  velocity_ms: 0.03        # freestream U [m/s]  ->  Re = U*D/nu = 100
  nu_m2s: 1.5e-5           # air

lattice:
  cells_per_char: 30       # D = 30 cells (spec minimum; 3D VRAM is the constraint)
  u_lat: 0.07              # -> tau = 0.563 via units.resolve()

domain:
  length_chars: 30         # 30 D  ->  nx = 900
  height_chars: 15         # 15 D  ->  ny = 450; blockage D/H = 6.7% < 8%
  span_chars: 3            # 3 D   ->  nz = 90, periodic

sgs: false

boundaries:
  inlet: equilibrium_ramp     # ramped over ramp_steps
  outlet: zero_gradient_sponge
  top_bottom: periodic
  ramp_steps: 2000
  sponge_fraction: 0.08       # last 8% of domain ramps viscosity up

obstacle:
  type: cylinder              # z-extruded circle
  center_x_chars: 8.0         # 8 D from inlet -> 22 D of wake to watch
  center_y_chars: 7.3         # 0.2 D below center: deterministic shedding
                              # trigger (Schaefer-Turek style). The 2D
                              # program sat on the symmetric steady branch
                              # for 35k steps without this — see NOTES.
